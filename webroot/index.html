<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Network Stack Switch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="topbar">
          <div>
            <p class="eyebrow">KernelSU Module WebUI</p>
            <h1>Network Stack Switch</h1>
          </div>
          <div id="stateBadge" class="badge pending">Ready</div>
        </div>

        <div class="actions" aria-label="IPv6 controls">
          <button id="enableBtn" class="primary" type="button">Enable IPv6</button>
          <button id="disableBtn" class="danger" type="button">Disable IPv6</button>
          <button id="refreshBtn" type="button">Refresh Status</button>
        </div>

        <pre id="output" class="terminal" aria-live="polite">$ ipv6_manager json-status
KernelSU WebUI ready.</pre>

        <div class="checkPanel">
          <h2>External IPv6 Tests</h2>
          <div class="checkActions">
            <button id="externalTestBtn" class="buttonLink primaryLink" type="button">
              Test with test-ipv6.com
            </button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
